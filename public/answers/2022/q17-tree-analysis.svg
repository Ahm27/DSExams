  <text x="120" y="145" fill="#a855f7" font-size="38" font-family="monospace">2022 Tree Analysis Answer</text>
  <text x="120" y="205" fill="#94a3b8" font-size="24" font-family="monospace">i. Not balanced</text>
  <text x="120" y="242" fill="#94a3b8" font-size="24" font-family="monospace">ii. Not a BST: 19 is in the right subtree of 23, but 19 &lt; 23</text>
  <text x="120" y="279" fill="#94a3b8" font-size="24" font-family="monospace">iii. Post-order: 12, 14, 9, 19, 23, 17, 67, 72, 54, 76, 50</text>
  <text x="120" y="316" fill="#94a3b8" font-size="24" font-family="monospace">iv. No unique BST deletion answer because the tree is not a valid BST</text>
  <text x="120" y="353" fill="#94a3b8" font-size="24" font-family="monospace">If BST deletion rules were applied hypothetically, the successor of 50 is 54</text>

